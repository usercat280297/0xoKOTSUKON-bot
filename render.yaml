services:
  - type: web
    name: 0xokotsukon-bot
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_APPLICATION_ID
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TICKET_TIMEZONE
        value: Asia/Bangkok
      - key: TICKET_HOURS_START
        value: "21"
      - key: TICKET_HOURS_END
        value: "24"
      - key: STEAM_UPDATE_POLL_MINUTES
        value: "1"
      - key: STEAM_UPDATE_BATCH_SIZE
        value: "120"
