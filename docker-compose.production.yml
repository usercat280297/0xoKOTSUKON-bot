services:
  postgres:
    image: postgres:16-alpine
    container_name: 0xokitsu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticket_bot}
      POSTGRES_USER: ${POSTGRES_USER:-ticketbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketbot} -d ${POSTGRES_DB:-ticket_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ticket-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 0xokitsu-ticket-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
